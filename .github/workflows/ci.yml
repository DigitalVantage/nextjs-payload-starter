name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ping:1}).ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: mongodb://127.0.0.1:27017/ci-test
      PAYLOAD_SECRET: ci-secret-do-not-use-in-prod
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
      CRON_SECRET: ci-cron-secret
      PREVIEW_SECRET: ci-preview-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-workspace

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Prettier check
        run: pnpm exec prettier --check .

      - name: Integration tests
        run: pnpm test:int

      - name: Build
        run: pnpm build
