version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'Europe/Warsaw'
    open-pull-requests-limit: 10
    commit-message:
      prefix: 'chore(deps)'
      include: 'scope'
    ignore:
      # ESLint 10 removes the `contextOrFilename.getFilename()` API still used by
      # eslint-plugin-react@7.x, which is pulled in transitively via
      # eslint-config-next. Bumping ESLint to 10 currently breaks `pnpm lint`.
      # Re-enable once eslint-plugin-react ships ESLint 10 compatibility.
      - dependency-name: 'eslint'
        versions: ['10.x']
      # @vitejs/plugin-react@6.x requires vite@7 but imports `vite/internal`
      # which vite@7 no longer exports — the plugin release is internally
      # inconsistent. Stay on plugin-react@4 / @5 line until upstream fixes
      # the import (or vitest ships a vite@7-coherent major).
      - dependency-name: '@vitejs/plugin-react'
        versions: ['6.x']
    groups:
      payload:
        patterns:
          - 'payload'
          - '@payloadcms/*'
      next:
        patterns:
          - 'next'
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
          - 'eslint-config-next'
      radix:
        patterns:
          - '@radix-ui/*'
      tailwind:
        patterns:
          - 'tailwindcss'
          - '@tailwindcss/*'
          - 'tw-animate-css'
          - 'autoprefixer'
          - 'postcss'
      lint-format:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - '@eslint/*'
          - 'prettier'
          - 'prettier-*'
      testing:
        patterns:
          - 'vitest'
          - '@vitest/*'
          - '@vitejs/plugin-react'
          - '@playwright/test'
          - '@testing-library/*'
          - 'jsdom'
      types:
        patterns:
          - '@types/*'
        exclude-patterns:
          - '@types/react'
          - '@types/react-dom'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '06:00'
      timezone: 'Europe/Warsaw'
    commit-message:
      prefix: 'ci(deps)'
      include: 'scope'
